apiVersion: apps/v1
kind: Deployment
metadata:
  name: isso-sf-content
  namespace: isso-sf
  labels:
    app: isso-sf
    service: content
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: isso-sf
      service: content
  template:
    metadata:
      labels:
        app: isso-sf
        service: content
    spec:
      containers:
      - name: content
        image: ghcr.io/khushal1198/isso_sf-content:main-8ad38d4
        ports:
        - containerPort: 50051
          name: grpc
        env:
        - name: SERVICE_NAME
          value: "content"
        - name: CONTENT_SERVICE_PORT
          value: "50051"
        - name: ISSO_S3_REGION
          value: "us-east-1"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: isso-sf-secrets
              key: database-url
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 50051
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 50051
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: isso-sf-content
  namespace: isso-sf
  labels:
    app: isso-sf
    service: content
spec:
  type: ClusterIP
  ports:
  - port: 50051
    targetPort: 50051
    protocol: TCP
    name: grpc
  selector:
    app: isso-sf
    service: content
