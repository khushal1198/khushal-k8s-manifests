apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: isso-sf
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/khushal1198/khushal-k8s-manifests
    targetRevision: main
    path: isso-sf/overlays/aws
  destination:
    server: https://kubernetes.default.svc
    namespace: isso-sf
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
