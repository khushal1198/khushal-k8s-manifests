apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: isso-sf  # Dedicated namespace

resources:
  - ../../base
  - ingress.yaml

patches:
  - path: patches/ui-patch.yaml
    target:
      kind: Deployment
      name: isso-sf-ui
  - path: patches/content-patch.yaml
    target:
      kind: Deployment
      name: isso-sf-content
  - path: patches/auth-patch.yaml
    target:
      kind: Deployment
      name: isso-sf-auth

images:
  - name: ghcr.io/khushal1198/isso_sf-ui
    newTag: latest
  - name: ghcr.io/khushal1198/isso_sf-content
    newTag: latest
  - name: ghcr.io/khushal1198/isso_sf-auth
    newTag: latest

labels:
  - pairs:
      environment: production
      region: us-east-1

configMapGenerator:
  - name: isso-sf-env-config
    literals:
      - AWS_REGION=us-east-1
      - ENVIRONMENT=production
      - LOG_LEVEL=info

secretGenerator:
  - name: isso-sf-secrets
    literals:
      - jwt-secret=CHANGE-ME-isso-sf-jwt-secret           # TODO: replace via SealedSecret / External Secret
      - admin-password=CHANGE-ME-admin-password           # TODO: replace before go-live
      - database-url=                                     # TODO: set when Postgres is provisioned
