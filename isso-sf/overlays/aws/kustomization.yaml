apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: isso-sf  # Dedicated namespace

resources:
  - ../../base
  - ingress.yaml

patches:
  - path: patches/ui-patch.yaml
    target:
      kind: Deployment
      name: isso-sf-ui
  - path: patches/content-patch.yaml
    target:
      kind: Deployment
      name: isso-sf-content
  - path: patches/auth-patch.yaml
    target:
      kind: Deployment
      name: isso-sf-auth

# Image tags come from the CI-bumped `image:` fields in the patches; no
# kustomize images: override (see base/kustomization.yaml note).

labels:
  - pairs:
      environment: production
      region: us-east-1

configMapGenerator:
  - name: isso-sf-env-config
    literals:
      - AWS_REGION=us-east-1
      - ENVIRONMENT=production
      - LOG_LEVEL=info

# NOTE: the `isso-sf-secrets` Secret (jwt-secret, admins-json, database-url) is
# materialized by the ExternalSecret in base/external-secrets.yaml from AWS
# Secrets Manager (isso-sf/app-secrets). No secrets are stored in git.
