apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: isso-sf-ingress
  namespace: isso-sf
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: instance
    # Share the same ALB as tracc/timeline (group.name) to save cost
    alb.ingress.kubernetes.io/group.name: tracc-production
    alb.ingress.kubernetes.io/group.order: "300"
    # Pin to the same subnets as the shared ALB (auto-discovery is unreliable here)
    alb.ingress.kubernetes.io/subnets: subnet-093dc27e9c19f247d,subnet-0a08ef6d4d1af68db
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    # Reuses the wildcard *.swaminarayantimeline.org ACM certificate
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:883669803269:certificate/7fbd23ed-724b-4b5e-8138-454666c46909
    external-dns.alpha.kubernetes.io/hostname: isso.swaminarayantimeline.org
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'
    # NOTE: shared ALB (group tracc-production) requires consistent tags across
    # all member ingresses, so we only set the common Environment tag here
    # (an app-specific Application tag would conflict with the timeline ingress).
    alb.ingress.kubernetes.io/tags: Environment=production
  labels:
    app: isso-sf
    service: ingress
spec:
  rules:
  # The UI server is the single entry point: it serves the SPA and proxies
  # /api/* to the Content and Auth gRPC services in-cluster.
  - host: isso.swaminarayantimeline.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: isso-sf-ui
            port:
              number: 80
