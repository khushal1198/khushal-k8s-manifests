apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: isso-sf  # Dedicated namespace

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - external-secrets.yaml
  - config-configmap.yaml
  - content-deployment.yaml
  - auth-deployment.yaml
  - ui-deployment.yaml

commonLabels:
  app: isso-sf
  managed-by: kustomize

# NOTE: image tags are set directly on the deployment/patch `image:` fields and
# bumped per-commit by the isso_sf CI. We intentionally do NOT use a kustomize
# `images:` newTag override here, since that would pin to a fixed tag and stop
# ArgoCD from rolling pods when CI bumps the SHA tag.
