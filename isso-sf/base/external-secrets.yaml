# External Secrets configuration for ISSO San Francisco.
# Reuses the shared GHCR credentials in AWS Secrets Manager (tracc/ghcr/credentials)
# via the cluster-wide ClusterSecretStore so the cluster can pull
# ghcr.io/khushal1198/isso_sf-* images.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-credentials
  namespace: isso-sf
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: ghcr-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "{{ .username }}",
                "password": "{{ .token }}",
                "auth": "{{ printf "%s:%s" .username .token | b64enc }}"
              }
            }
          }
  data:
    - secretKey: username
      remoteRef:
        key: tracc/ghcr/credentials
        property: username
    - secretKey: token
      remoteRef:
        key: tracc/ghcr/credentials
        property: token
